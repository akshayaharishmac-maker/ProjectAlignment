function FileDropZone({ label, icon, file, onFile }) {
  const [drag, setDrag] = useState(false);
  const ref = useRef();
  const handle = (f) => { if (f && (f.name.endsWith(".pdf") || f.name.endsWith(".docx"))) onFile(f); };
  return (
    <div>
      <div style={S.sectionLabel}>{icon} {label}</div>
      <div
        style={S.dropzone(drag, !!file)}
        onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={(e) => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); }}
        onClick={() => ref.current.click()}
      >
        <div style={{ fontSize: 30, marginBottom: 8 }}>{file ? "📄" : "☁️"}</div>
        {file ? (
          <><div style={{ fontSize: 14, fontWeight: 600 }}>{file.name}</div>
            <div style={{ fontSize: 12, color: COLORS.success, marginTop: 6, fontWeight: 600 }}>✓ Ready</div></>
        ) : (
          <><div style={{ fontSize: 13, fontWeight: 500, marginBottom: 4 }}>Drop here or click to browse</div>
            <div style={{ fontSize: 12, color: COLORS.muted }}>PDF or DOCX</div></>
        )}
        <input ref={ref} type="file" accept=".pdf,.docx" style={{ display: "none" }} onChange={(e) => handle(e.target.files[0])} />
      </div>
    </div>
  );
}

function Loader({ stepIdx }) {
  return (
    <div style={S.loader}>
      <div style={S.spinner} />
      <div style={{ fontSize: 15, fontWeight: 600, color: COLORS.accentLight }}>Aligning document...</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 4 }}>
        {STEPS.map((step, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: i < stepIdx ? COLORS.success : i === stepIdx ? COLORS.accentLight : COLORS.muted }}>
            <span>{i < stepIdx ? "✓" : i === stepIdx ? "⟳" : "○"}</span>{step}
          </div>
        ))}
      </div>
    </div>
  );
}

          </div>

          <div style={S.inputGrid}>
            <div style={S.inputWrap}>
              <label style={S.inputLabel}>Grade</label>
              <input style={S.input(focused === "grade")} value={info.grade}
                placeholder="e.g. X or VII"
                onFocus={() => setFocused("grade")} onBlur={() => setFocused(null)}
                onChange={setField("grade")} />
            </div>
            <div style={S.inputWrap}>
              <label style={S.inputLabel}>Date</label>
              <input style={S.input(focused === "date")} value={info.date}
                placeholder="e.g. 29.8.2025"
                onFocus={() => setFocused("date")} onBlur={() => setFocused(null)}
                onChange={setField("date")} />
            </div>
            <div style={S.inputWrap}>
              <label style={S.inputLabel}>Duration</label>
              <input style={S.input(focused === "duration")} value={info.duration}
                placeholder="e.g. 3 hours"
                onFocus={() => setFocused("duration")} onBlur={() => setFocused(null)}
                onChange={setField("duration")} />
            </div>
            <div style={S.inputWrap}>
              <label style={S.inputLabel}>Max. Marks</label>
              <input style={S.input(focused === "maxMarks")} value={info.maxMarks}
                placeholder="e.g. 80"
                onFocus={() => setFocused("maxMarks")} onBlur={() => setFocused(null)}
                onChange={setField("maxMarks")} />
            </div>
            <div style={{ ...S.inputWrap, gridColumn: "1 / 3" }}>
              <label style={S.inputLabel}>Exam Title</label>
              <input style={S.input(focused === "examTitle")} value={info.examTitle}
                placeholder="e.g. TERM (I) – EXAMINATION"
                onFocus={() => setFocused("examTitle")} onBlur={() => setFocused(null)}
                onChange={setField("examTitle")} />
            </div>
            <div style={{ ...S.inputWrap, gridColumn: "3 / 5" }}>
              <label style={S.inputLabel}>Subject</label>
              <input style={S.input(focused === "subject")} value={info.subject}
                placeholder="e.g. TAMIL II PAPER"
                onFocus={() => setFocused("subject")} onBlur={() => setFocused(null)}
                onChange={setField("subject")} />
            </div>
          </div>
        </div>

        {/* ── STEP 2: FILES ── */}
        <div style={S.card}>
          <div style={S.sectionLabel}>📂 Step 2 — Upload Paper to Align</div>
          <div style={{ marginBottom: 20 }}>
            <FileDropZone label="Upload Question Paper (PDF or DOCX)" icon="📄" file={uploadFile} onFile={setUploadFile} />
          </div>
          <div style={{ textAlign: "center" }}>
            <button style={S.btn("primary", !uploadFile || loading)}
              disabled={!uploadFile || loading} onClick={runAlignment}>
              {loading ? "Aligning..." : "⚡ Align Document"}
            </button>
            {!uploadFile && (
              <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 10 }}>Upload a paper to begin alignment</div>
            )}
          </div>
        </div>

        {error && <div style={{ ...S.card, borderColor: COLORS.error, color: COLORS.error, textAlign: "center" }}>⚠️ {error}</div>}
        {loading && <div style={S.card}><Loader stepIdx={stepIdx} /></div>}

        {/* ── RESULT ── */}
        {result && !loading && (
          <div style={S.card}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Alignment Report</div>
                <div style={{ fontSize: 13, color: COLORS.muted, maxWidth: 600 }}>{result.summary}</div>
              </div>
              <div style={S.scoreCircle(result.alignmentScore)}>
                <div style={{ fontSize: 22, fontWeight: 800, lineHeight: 1, color: result.alignmentScore >= 80 ? COLORS.success : result.alignmentScore >= 50 ? COLORS.warn : COLORS.error }}>{result.alignmentScore}</div>
                <div style={{ fontSize: 10, color: COLORS.muted, marginTop: 2 }}>SCORE</div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
              {["issues", "aligned"].map(t => (
                <button key={t} style={S.tab(activeTab === t)} onClick={() => setActiveTab(t)}>
                  {t === "issues" ? `⚠️ Issues (${result.issues?.length || 0})` : "✅ Aligned Document"}
                </button>
              ))}
            </div>

            {activeTab === "issues" && (
              result.issues?.length === 0
                ? <div style={{ textAlign: "center", padding: 32, color: COLORS.success }}>✅ Perfectly aligned!</div>
                : result.issues?.map((issue, i) => (
                  <div key={i} style={S.analysisRow}>
                    <div style={S.dot(sevColor(issue.severity))} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                        <span>{catIcon(issue.category)}</span>
                        <span style={{ fontWeight: 600, fontSize: 14 }}>{issue.title}</span>
                        <span style={S.badge(sevColor(issue.severity))}>{issue.severity}</span>
                        <span style={S.badge(COLORS.muted)}>{issue.category}</span>
                      </div>
                      <div style={{ fontSize: 13, color: COLORS.muted, lineHeight: 1.5 }}>{issue.description}</div>
                      {issue.fix && <div style={{ fontSize: 12, color: COLORS.accentLight, marginTop: 6 }}>🔧 Fix: {issue.fix}</div>}
                    </div>
                  </div>
                ))
            )}

            {activeTab === "aligned" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                  <div style={{ fontSize: 13, color: COLORS.muted }}>Corrected paper with your fixed header</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={S.btn("secondary")} onClick={() => {
                      const fullText = buildHeaderText() + "\n\n" + result.alignedDocument;
                      navigator.clipboard.writeText(fullText).then(() => {
                        alert("✅ Copied to clipboard! Paste into Word or Notes to save.");
                      }).catch(() => {
                        alert("Could not copy. Please select all text in the preview and copy manually.");
                      });
                    }}>📋 Copy Text</button>
                    <button style={S.btn("secondary")} onClick={() => {
                      const fullText = buildHeaderText() + "\n\n" + result.alignedDocument;
                      const w = window.open("", "_blank");
                      w.document.write("<pre style='font-family:Times New Roman,serif;font-size:13px;line-height:1.6;padding:32px;white-space:pre-wrap'>" + fullText.replace(/</g,"&lt;").replace(/>/g,"&gt;") + "</pre>");
                      w.document.title = "Aligned Paper";
                      w.document.close();
                    }}>🖨️ Open to Print/Save</button>
                  </div>
                </div>
                <div style={S.alignedDocBox}>
                  <PaperHeader info={info} />
                  <div style={{ padding: "20px 28px", fontFamily: "'Times New Roman', serif", fontSize: 12, lineHeight: 1.5, color: "#111" }}>
                    {result.alignedDocument
                      .split("\n")
                      .reduce((acc, line) => {
                        if (line.trim() === "" && acc.length > 0 && acc[acc.length - 1] === "") return acc;
                        return [...acc, line.trim() === "" ? "" : line];
                      }, [])
                      .map((line, i) => {
                        const isSectionHeader = /^பகுதி\s*[-–]/.test(line.trim());
                        const isQHeader = /^(I{1,3}|IV|VI{0,3}|IX|X[I]{0,2})\b/.test(line.trim());
                        if (line === "") return <div key={i} style={{ height: 5 }} />;
                        return (
                          <div key={i} style={{
                            fontWeight: isSectionHeader || isQHeader ? 700 : 400,
                            lineHeight: 1.55,
                          }}>{line}</div>
                        );
                      })}
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
